<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Women's Day Surprise ❤️</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:black;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

#loading{
font-size:28px;
}

#message{
display:none;
font-size:35px;
color:#ff4da6;
}

.heart{
position:absolute;
font-size:25px;
animation:explode 3s linear forwards;
}

@keyframes explode{
0%{transform:scale(0) translateY(0); opacity:1;}
100%{transform:scale(2) translateY(-500px); opacity:0;}
}

</style>
</head>

<body>

<div id="loading">Loading your surprise...</div>

<div id="message">
🌸 Happy Women's Day 🌸 <br><br>
Minti ❤️ <br>
You are the most beautiful woman in my life
</div>

<audio id="music" autoplay>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
</audio>

<script>

setTimeout(()=>{
document.getElementById("loading").style.display="none";
document.getElementById("message").style.display="block";
explodeHearts();
},3000);

function explodeHearts(){
for(let i=0;i<40;i++){
let heart=document.createElement("div");
heart.innerHTML="❤️";
heart.classList.add("heart");
heart.style.left=Math.random()*100+"vw";
heart.style.top=Math.random()*100+"vh";
document.body.appendChild(heart);

setTimeout(()=>{heart.remove()},3000);
}
}

</script>

</body>
</html>
