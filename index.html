<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Women's Day Surprise ❤️</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
font-family:Arial;
color:white;
text-align:center;
overflow:hidden;
}

#heart{
font-size:120px;
cursor:pointer;
animation:beat 1s infinite;
}

@keyframes beat{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

#message{
display:none;
font-size:30px;
}

.heart{
position:absolute;
font-size:25px;
animation:explode 3s linear forwards;
}

@keyframes explode{
0%{transform:scale(0);opacity:1;}
100%{transform:scale(2) translateY(-400px);opacity:0;}
}

</style>

</head>

<body>

<div id="heart" onclick="start()">❤️</div>

<div id="message"></div>

<audio id="music">
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
</audio>

<script>

let text="Happy Women's Day Minti ❤️ You are the most beautiful woman in my life.";
let i=0;

function start(){
document.getElementById("heart").style.display="none";
document.getElementById("message").style.display="block";
document.getElementById("music").play();
type();
explode();
}

function type(){
if(i<text.length){
document.getElementById("message").innerHTML+=text.charAt(i);
i++;
setTimeout(type,50);
}
}

function explode(){
for(let i=0;i<40;i++){
let h=document.createElement("div");
h.innerHTML="❤️";
h.classList.add("heart");
h.style.left=Math.random()*100+"vw";
h.style.top=Math.random()*100+"vh";
document.body.appendChild(h);

setTimeout(()=>{h.remove()},3000);
}
}

</script>

</body>
</html>
