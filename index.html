<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Women's Day Surprise</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#111;
font-family:Arial;
color:white;
text-align:center;
overflow:hidden;
}

#heart{
font-size:120px;
cursor:pointer;
transition:0.3s;
}

#heart:hover{
transform:scale(1.2);
}

#question{
display:none;
font-size:28px;
margin-top:20px;
}

button{
padding:10px 20px;
font-size:18px;
margin:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

#yes{
background:#ff4d88;
color:white;
}

#no{
background:gray;
color:white;
position:relative;
}

</style>

</head>

<body>

<div>

<div id="heart" onclick="showQuestion()">❤️</div>

<div id="question">
<p>Minti ❤️<br>Will you always be my favorite woman?</p>

<button id="yes" onclick="yes()">Yes</button>
<button id="no" onmouseover="move()">No</button>

</div>

</div>

<script>

function showQuestion(){
document.getElementById("heart").style.display="none";
document.getElementById("question").style.display="block";
}

function yes(){
document.body.innerHTML="<h1>❤️ Happy Women's Day Minti ❤️</h1><p>You make my world beautiful.</p>";
}

function move(){
let btn=document.getElementById("no");
btn.style.position="absolute";
btn.style.left=Math.random()*80+"%";
btn.style.top=Math.random()*80+"%";
}

</script>

</body>
</html>
